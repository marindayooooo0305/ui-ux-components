<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Glass Card - 液态玻璃卡片</title>
<style>
  /* ============================================
     液态玻璃卡片 - Liquid Glass Card
     边缘透镜效果 + 光线扭曲
     格式: 1x1 / 2x2 / 4x2
     ============================================ */

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    /* 玻璃材质变量 */
    --glass-bg: rgba(255, 255, 255, 0.06);
    --glass-border: rgba(255, 255, 255, 0.18);
    --glass-blur: 22px;
    --glass-saturate: 180%;
    --lens-scale: 25;
    --lens-blur: 8px;
    --edge-glow: rgba(255, 255, 255, 0.12);
    --specular-opacity: 0.35;
    --caustic-opacity: 0.06;
    --chromatic-offset: 1.5px;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #0a0a12;
    font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow-x: hidden;
    color: #fff;
  }

  /* ---- 场景背景 ---- */
  .scene {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }

  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.7;
    will-change: transform;
  }

  .blob-1 {
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, #6366f1 0%, #4f46e5 50%, transparent 70%);
    top: -10%;
    left: -5%;
    animation: drift-1 20s ease-in-out infinite;
  }

  .blob-2 {
    width: 450px;
    height: 450px;
    background: radial-gradient(circle, #ec4899 0%, #be185d 50%, transparent 70%);
    top: 50%;
    right: -8%;
    animation: drift-2 25s ease-in-out infinite;
  }

  .blob-3 {
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, #06b6d4 0%, #0891b2 50%, transparent 70%);
    bottom: -5%;
    left: 30%;
    animation: drift-3 22s ease-in-out infinite;
  }

  .blob-4 {
    width: 350px;
    height: 350px;
    background: radial-gradient(circle, #f59e0b 0%, #d97706 50%, transparent 70%);
    top: 20%;
    left: 55%;
    animation: drift-4 18s ease-in-out infinite;
  }

  .blob-5 {
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, #10b981 0%, #059669 50%, transparent 70%);
    bottom: 20%;
    left: 10%;
    animation: drift-5 24s ease-in-out infinite;
  }

  @keyframes drift-1 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(80px, 60px) scale(1.1); }
    66% { transform: translate(-40px, 30px) scale(0.95); }
  }
  @keyframes drift-2 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(-70px, -50px) scale(1.05); }
    66% { transform: translate(30px, -80px) scale(0.9); }
  }
  @keyframes drift-3 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(60px, -40px) scale(1.08); }
    66% { transform: translate(-50px, 20px) scale(0.92); }
  }
  @keyframes drift-4 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(-50px, 70px) scale(0.95); }
    66% { transform: translate(40px, -30px) scale(1.1); }
  }
  @keyframes drift-5 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(70px, 30px) scale(1.05); }
    66% { transform: translate(-60px, -50px) scale(0.98); }
  }

  /* ---- 卡片展示区 ---- */
  .card-showcase {
    position: relative;
    z-index: 1;
    display: flex;
    flex-wrap: wrap;
    gap: 32px;
    justify-content: center;
    align-items: center;
    padding: 60px 40px;
    max-width: 1100px;
  }

  /* ---- 玻璃卡片基础 ---- */
  .glass-card {
    position: relative;
    border-radius: 24px;
    cursor: default;
    transform-style: preserve-3d;
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    will-change: transform;
  }

  .glass-card:hover {
    z-index: 10;
  }

  /* 格式尺寸 */
  .size-1x1 { width: 200px; height: 200px; }
  .size-2x2 { width: 420px; height: 420px; }
  .size-4x2 { width: 420px; height: 200px; }

  /* ---- 透镜扭曲层 ---- */
  .lens-layer {
    position: absolute;
    inset: -12px;
    border-radius: 32px;
    backdrop-filter: blur(2px) saturate(120%);
    -webkit-backdrop-filter: blur(2px) saturate(120%);
    filter: url(#liquid-lens);
    z-index: 0;
    overflow: hidden;
  }

  /* ---- 玻璃主体 ---- */
  .glass-body {
    position: absolute;
    inset: 0;
    border-radius: 24px;
    background: var(--glass-bg);
    backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
    -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
    border: 1px solid var(--glass-border);
    z-index: 1;
    overflow: hidden;
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.1),
      inset 0 -1px 0 rgba(0, 0, 0, 0.1),
      0 8px 32px rgba(0, 0, 0, 0.3),
      0 2px 8px rgba(0, 0, 0, 0.2);
  }

  /* ---- 棱镜边缘（色散效果） ---- */
  .prismatic-edge {
    position: absolute;
    inset: -1px;
    border-radius: 25px;
    z-index: 2;
    pointer-events: none;
    overflow: hidden;
  }

  .prismatic-edge::before {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 26px;
    padding: 2px;
    background: conic-gradient(
      from var(--prism-angle, 0deg),
      rgba(255, 0, 0, 0.0) 0%,
      rgba(255, 60, 60, 0.25) 8%,
      rgba(255, 180, 0, 0.2) 16%,
      rgba(255, 255, 0, 0.15) 24%,
      rgba(60, 255, 60, 0.2) 32%,
      rgba(0, 200, 255, 0.25) 40%,
      rgba(80, 80, 255, 0.2) 48%,
      rgba(180, 0, 255, 0.25) 56%,
      rgba(255, 0, 180, 0.2) 64%,
      rgba(255, 0, 0, 0.0) 72%,
      transparent 72%
    );
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity: 0.6;
    animation: prism-rotate 8s linear infinite;
  }

  @keyframes prism-rotate {
    to { --prism-angle: 360deg; }
  }

  @property --prism-angle {
    syntax: '<angle>';
    initial-value: 0deg;
    inherits: false;
  }

  /* ---- 色差边缘（chromatic aberration） ---- */
  .chromatic-edge {
    position: absolute;
    inset: 0;
    border-radius: 24px;
    z-index: 3;
    pointer-events: none;
    box-shadow:
      inset 1px 0 0 rgba(255, 80, 80, 0.12),
      inset -1px 0 0 rgba(80, 80, 255, 0.12),
      inset 0 1px 0 rgba(80, 255, 80, 0.08),
      inset 0 -1px 0 rgba(255, 80, 255, 0.08);
  }

  /* ---- 高光反射 ---- */
  .specular {
    position: absolute;
    inset: 0;
    border-radius: 24px;
    z-index: 4;
    pointer-events: none;
    overflow: hidden;
  }

  .specular::before {
    content: '';
    position: absolute;
    width: 200%;
    height: 200%;
    top: var(--spec-y, -80%);
    left: var(--spec-x, -80%);
    background: radial-gradient(
      ellipse at center,
      rgba(255, 255, 255, var(--specular-opacity)) 0%,
      rgba(255, 255, 255, 0.08) 30%,
      transparent 60%
    );
    transition: top 0.3s ease-out, left 0.3s ease-out;
    mix-blend-mode: overlay;
  }

  /* ---- 焦散光纹 ---- */
  .caustics {
    position: absolute;
    inset: 0;
    border-radius: 24px;
    z-index: 5;
    pointer-events: none;
    overflow: hidden;
    opacity: var(--caustic-opacity);
  }

  .caustics::before {
    content: '';
    position: absolute;
    inset: -50%;
    background:
      radial-gradient(ellipse 80px 60px at 30% 25%, rgba(255,255,255,0.5) 0%, transparent 70%),
      radial-gradient(ellipse 60px 90px at 70% 60%, rgba(255,255,255,0.4) 0%, transparent 70%),
      radial-gradient(ellipse 50px 50px at 50% 80%, rgba(255,255,255,0.3) 0%, transparent 70%),
      radial-gradient(ellipse 70px 40px at 20% 70%, rgba(255,255,255,0.35) 0%, transparent 70%);
    animation: caustic-drift 12s ease-in-out infinite;
    mix-blend-mode: overlay;
  }

  @keyframes caustic-drift {
    0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
    25% { transform: translate(15px, -10px) rotate(3deg) scale(1.05); }
    50% { transform: translate(-10px, 15px) rotate(-2deg) scale(0.98); }
    75% { transform: translate(8px, 8px) rotate(1deg) scale(1.02); }
  }

  /* ---- 内部折射光带 ---- */
  .refraction-band {
    position: absolute;
    inset: 0;
    border-radius: 24px;
    z-index: 6;
    pointer-events: none;
    overflow: hidden;
  }

  .refraction-band::before {
    content: '';
    position: absolute;
    top: -100%;
    left: -50%;
    width: 200%;
    height: 40%;
    background: linear-gradient(
      180deg,
      transparent 0%,
      rgba(255, 255, 255, 0.03) 30%,
      rgba(255, 255, 255, 0.06) 50%,
      rgba(255, 255, 255, 0.03) 70%,
      transparent 100%
    );
    transform: rotate(-15deg);
    animation: refraction-sweep 6s ease-in-out infinite;
  }

  @keyframes refraction-sweep {
    0%, 100% { top: -40%; opacity: 0.6; }
    50% { top: 100%; opacity: 0.3; }
  }

  /* ---- 液态呼吸动画 ---- */
  .glass-card::after {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 26px;
    z-index: -1;
    background: transparent;
    box-shadow: 0 0 20px rgba(255, 255, 255, 0.03);
    animation: liquid-breathe 4s ease-in-out infinite;
  }

  @keyframes liquid-breathe {
    0%, 100% {
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.03);
      border-radius: 26px;
    }
    50% {
      box-shadow: 0 0 35px rgba(255, 255, 255, 0.06);
      border-radius: 28px;
    }
  }

  /* ---- 卡片内容 ---- */
  .card-content {
    position: relative;
    z-index: 7;
    padding: 24px;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .card-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.5);
    margin-bottom: 8px;
  }

  .card-title {
    font-size: 18px;
    font-weight: 700;
    color: rgba(255, 255, 255, 0.95);
    line-height: 1.3;
    letter-spacing: -0.02em;
  }

  .card-value {
    font-size: 42px;
    font-weight: 200;
    color: #fff;
    line-height: 1;
    letter-spacing: -0.03em;
  }

  .card-value .unit {
    font-size: 18px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.5);
    margin-left: 4px;
  }

  .card-desc {
    font-size: 13px;
    color: rgba(255, 255, 255, 0.45);
    line-height: 1.5;
  }

  .card-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    margin-bottom: 12px;
  }

  /* ---- 2x2 卡片内容 ---- */
  .size-2x2 .card-content {
    padding: 32px;
  }

  .size-2x2 .card-title {
    font-size: 24px;
  }

  .size-2x2 .card-value {
    font-size: 64px;
  }

  .size-2x2 .card-icon {
    width: 48px;
    height: 48px;
    font-size: 24px;
    border-radius: 14px;
  }

  /* ---- 4x2 卡片内容 ---- */
  .size-4x2 .card-content {
    padding: 28px 32px;
    flex-direction: row;
    align-items: center;
    gap: 32px;
  }

  .size-4x2 .card-info {
    flex: 1;
    min-width: 0;
  }

  .size-4x2 .card-visual {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .size-4x2 .bar {
    width: 4px;
    border-radius: 2px;
    background: rgba(255, 255, 255, 0.15);
    transition: height 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  .size-4x2 .bar.active {
    background: rgba(255, 255, 255, 0.5);
  }

  /* ---- 标签区 ---- */
  .format-label {
    position: absolute;
    bottom: -28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.3);
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  /* ---- 点击涟漪 ---- */
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
    transform: scale(0);
    animation: ripple-expand 0.6s ease-out forwards;
    pointer-events: none;
    z-index: 8;
  }

  @keyframes ripple-expand {
    to {
      transform: scale(4);
      opacity: 0;
    }
  }

  /* ---- 响应式 ---- */
  @media (max-width: 768px) {
    .card-showcase {
      padding: 40px 20px;
      gap: 40px;
    }
    .size-2x2 { width: 320px; height: 320px; }
    .size-4x2 { width: 320px; height: 160px; }
    .size-2x2 .card-value { font-size: 48px; }
  }

  /* ---- 减少动效偏好 ---- */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
    .lens-layer {
      filter: none !important;
    }
  }
</style>
</head>
<body>

<!-- SVG 滤镜定义 -->
<svg class="svg-defs" style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
  <defs>
    <!-- 液态透镜扭曲滤镜 -->
    <filter id="liquid-lens" x="-8%" y="-8%" width="116%" height="116%" color-interpolation-filters="sRGB">
      <!-- 生成有机噪声纹理 -->
      <feTurbulence
        type="fractalNoise"
        baseFrequency="0.012"
        numOctaves="3"
        seed="3"
        result="noise"
      />

      <!-- 构建边缘蒙版：膨胀源形状 → 减去原始 → 得到外环 -->
      <feMorphology operator="dilate" radius="22" in="SourceAlpha" result="expanded" />
      <feComposite operator="out" in="expanded" in2="SourceAlpha" result="outerRing" />

      <!-- 柔化边缘蒙版 -->
      <feGaussianBlur in="outerRing" stdDeviation="10" result="softEdge" />

      <!-- 仅在边缘区域应用噪声 -->
      <feComposite operator="in" in="noise" in2="softEdge" result="edgeNoise" />

      <!-- 中性基底（无位移） -->
      <feFlood flood-color="rgb(128,128,128)" result="neutral" />

      <!-- 合成位移贴图：中性中心 + 噪声边缘 -->
      <feComposite operator="over" in="neutral" in2="edgeNoise" result="dispMap" />

      <!-- 应用位移映射 -->
      <feDisplacementMap
        in="SourceGraphic"
        in2="dispMap"
        scale="25"
        xChannelSelector="R"
        yChannelSelector="G"
      />
    </filter>

    <!-- 增强版透镜扭曲（用于 2x2 大卡片） -->
    <filter id="liquid-lens-lg" x="-8%" y="-8%" width="116%" height="116%" color-interpolation-filters="sRGB">
      <feTurbulence
        type="fractalNoise"
        baseFrequency="0.008"
        numOctaves="4"
        seed="7"
        result="noise"
      />
      <feMorphology operator="dilate" radius="30" in="SourceAlpha" result="expanded" />
      <feComposite operator="out" in="expanded" in2="SourceAlpha" result="outerRing" />
      <feGaussianBlur in="outerRing" stdDeviation="14" result="softEdge" />
      <feComposite operator="in" in="noise" in2="softEdge" result="edgeNoise" />
      <feFlood flood-color="rgb(128,128,128)" result="neutral" />
      <feComposite operator="over" in="neutral" in2="edgeNoise" result="dispMap" />
      <feDisplacementMap
        in="SourceGraphic"
        in2="dispMap"
        scale="30"
        xChannelSelector="R"
        yChannelSelector="G"
      />
    </filter>
  </defs>
</svg>

<!-- 场景背景 -->
<div class="scene" aria-hidden="true">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>
  <div class="blob blob-5"></div>
</div>

<!-- 卡片展示 -->
<main class="card-showcase">

  <!-- ====== 1x1 卡片 ====== -->
  <div class="glass-card size-1x1" data-tilt>
    <div class="lens-layer" style="filter: url(#liquid-lens)"></div>
    <div class="glass-body"></div>
    <div class="prismatic-edge"></div>
    <div class="chromatic-edge"></div>
    <div class="specular"></div>
    <div class="caustics"></div>
    <div class="refraction-band"></div>
    <div class="card-content">
      <div>
        <div class="card-icon">&#9728;</div>
        <div class="card-label">Temperature</div>
      </div>
      <div>
        <div class="card-value">26<span class="unit">°C</span></div>
        <div class="card-desc">Partly cloudy</div>
      </div>
    </div>
    <span class="format-label">1 x 1</span>
  </div>

  <!-- ====== 2x2 卡片 ====== -->
  <div class="glass-card size-2x2" data-tilt>
    <div class="lens-layer" style="filter: url(#liquid-lens-lg)"></div>
    <div class="glass-body"></div>
    <div class="prismatic-edge"></div>
    <div class="chromatic-edge"></div>
    <div class="specular"></div>
    <div class="caustics"></div>
    <div class="refraction-band"></div>
    <div class="card-content">
      <div>
        <div class="card-icon">&#9835;</div>
        <div class="card-label">Now Playing</div>
        <div class="card-title">Liquid Dreams</div>
        <div class="card-desc">Glass Frequencies &mdash; 2026</div>
      </div>
      <div>
        <div class="card-value">4:32</div>
        <div class="card-desc" style="margin-top:8px">Track 3 of 8</div>
      </div>
    </div>
    <span class="format-label">2 x 2</span>
  </div>

  <!-- ====== 4x2 卡片 ====== -->
  <div class="glass-card size-4x2" data-tilt>
    <div class="lens-layer" style="filter: url(#liquid-lens)"></div>
    <div class="glass-body"></div>
    <div class="prismatic-edge"></div>
    <div class="chromatic-edge"></div>
    <div class="specular"></div>
    <div class="caustics"></div>
    <div class="refraction-band"></div>
    <div class="card-content">
      <div class="card-info">
        <div class="card-icon">&#9677;</div>
        <div class="card-label">System Status</div>
        <div class="card-title" style="font-size:20px">All Services Operational</div>
        <div class="card-desc">Uptime: 99.97% &middot; Latency: 12ms</div>
      </div>
      <div class="card-visual" id="bar-chart">
        <!-- JS 动态生成柱状图 -->
      </div>
    </div>
    <span class="format-label">4 x 2</span>
  </div>

</main>

<script>
/**
 * 液态玻璃卡片交互
 *
 * 功能：
 * 1. 鼠标追踪高光反射
 * 2. 3D 倾斜效果
 * 3. 点击涟漪
 * 4. 4x2 卡片动态柱状图
 */

(function () {
  'use strict';

  /* ---- 鼠标追踪高光 + 3D 倾斜 ---- */
  const cards = document.querySelectorAll('[data-tilt]');

  cards.forEach((card) => {
    const specular = card.querySelector('.specular');

    card.addEventListener('mousemove', (e) => {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const centerX = rect.width / 2;
      const centerY = rect.height / 2;

      // 高光位置
      const specX = ((x / rect.width) * 100 - 50) * -2;
      const specY = ((y / rect.height) * 100 - 50) * -2;
      specular.style.setProperty('--spec-x', `${specX - 80}%`);
      specular.style.setProperty('--spec-y', `${specY - 80}%`);

      // 3D 倾斜
      const rotateY = ((x - centerX) / centerX) * 6;
      const rotateX = ((centerY - y) / centerY) * 6;
      card.style.transform = `perspective(800px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.02)`;
    });

    card.addEventListener('mouseleave', () => {
      card.style.transform = 'perspective(800px) rotateX(0deg) rotateY(0deg) scale(1)';
      specular.style.setProperty('--spec-x', '-80%');
      specular.style.setProperty('--spec-y', '-80%');
    });

    // 点击涟漪
    card.addEventListener('click', (e) => {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const ripple = document.createElement('div');
      ripple.className = 'ripple';
      ripple.style.left = `${x - 25}px`;
      ripple.style.top = `${y - 25}px`;
      ripple.style.width = '50px';
      ripple.style.height = '50px';
      card.querySelector('.glass-body').appendChild(ripple);
      ripple.addEventListener('animationend', () => ripple.remove());
    });
  });

  /* ---- 4x2 卡片柱状图 ---- */
  const barChart = document.getElementById('bar-chart');
  if (barChart) {
    const heights = [28, 45, 36, 58, 42, 65, 50, 38, 55, 48, 60, 40];
    heights.forEach((h, i) => {
      const bar = document.createElement('div');
      bar.className = 'bar' + (i >= heights.length - 3 ? ' active' : '');
      bar.style.height = `${h}px`;
      barChart.appendChild(bar);
    });

    // 缓慢动态变化
    setInterval(() => {
      const bars = barChart.querySelectorAll('.bar');
      bars.forEach((bar) => {
        const current = parseInt(bar.style.height, 10);
        const delta = Math.round((Math.random() - 0.5) * 8);
        const next = Math.max(16, Math.min(70, current + delta));
        bar.style.height = `${next}px`;
      });
    }, 2000);
  }

})();
</script>

</body>
</html>
