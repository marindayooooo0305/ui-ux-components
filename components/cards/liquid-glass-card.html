<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Glass Card - 液态玻璃卡片</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    overflow: hidden;
    background: #0a0a14;
    font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  canvas {
    display: block;
    position: fixed;
    inset: 0;
  }

  /* ---- 模式选择器 ---- */
  .controls {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 10;
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    padding: 5px;
  }

  .control-btn {
    padding: 10px 20px;
    border-radius: 16px;
    border: none;
    background: transparent;
    color: rgba(255, 255, 255, 0.5);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: all 0.3s ease;
    white-space: nowrap;
    font-family: inherit;
  }

  .control-btn:hover {
    color: rgba(255, 255, 255, 0.8);
    background: rgba(255, 255, 255, 0.06);
  }

  .control-btn.active {
    color: #fff;
    background: rgba(255, 255, 255, 0.12);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
  }

  /* ---- 格式标签 ---- */
  .format-labels {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
    pointer-events: none;
  }

  .format-label {
    position: absolute;
    font-size: 12px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.2);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    white-space: nowrap;
    text-align: center;
    transition: opacity 0.4s ease;
  }

  /* ---- 提示 ---- */
  .hint {
    position: fixed;
    top: 32px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-size: 13px;
    color: rgba(255, 255, 255, 0.25);
    letter-spacing: 0.04em;
    pointer-events: none;
  }

  @media (max-width: 640px) {
    .control-btn {
      padding: 8px 14px;
      font-size: 12px;
    }
    .controls { gap: 4px; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.01ms !important; }
  }
</style>
</head>
<body>

<div class="hint">Move your cursor to interact with the glass</div>

<div class="controls" id="controls">
  <button class="control-btn active" data-mode="lens">Lens · 1×1</button>
  <button class="control-btn" data-mode="cube">Cube · 2×2</button>
  <button class="control-btn" data-mode="bar">Bar · 4×2</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.157.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

/* ============================================================
   液态玻璃卡片 — Three.js 实现
   参考 React Bits / MeshTransmissionMaterial 渲染管线：
   1. 背景场景渲染到 FBO
   2. 全屏四边形显示 FBO 纹理
   3. 玻璃网格使用自定义透射着色器采样 FBO
   ============================================================ */

// ── DOM ────────────────────────────────────────────────────
const controlsEl = document.getElementById('controls');
const buttons = controlsEl.querySelectorAll('.control-btn');

// ── 状态 ──────────────────────────────────────────────────
let currentMode = 'lens';
const mouse = new THREE.Vector2(0, 0);
const targetMouse = new THREE.Vector2(0, 0);

// ── 渲染器 ────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 0);
document.body.appendChild(renderer.domElement);

// ── 相机 ──────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(
  18,
  window.innerWidth / window.innerHeight,
  0.1,
  100
);
camera.position.set(0, 0, 20);
camera.lookAt(0, 0, 15);

// 正交相机（用于全屏四边形）
const orthoCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

// ── 场景 ──────────────────────────────────────────────────
const bgScene = new THREE.Scene();
const mainScene = new THREE.Scene();
const quadScene = new THREE.Scene();

// ── FBO ───────────────────────────────────────────────────
const fbo = new THREE.WebGLRenderTarget(
  window.innerWidth * 2,
  window.innerHeight * 2,
  {
    minFilter: THREE.LinearFilter,
    magFilter: THREE.LinearFilter,
    colorSpace: THREE.SRGBColorSpace,
  }
);

// ── 全屏四边形 ────────────────────────────────────────────
const quadMat = new THREE.MeshBasicMaterial({
  map: fbo.texture,
  transparent: true,
  depthWrite: false,
  depthTest: false,
});
const quad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), quadMat);
quad.renderOrder = 0;
quadScene.add(quad);

// ═══════════════════════════════════════════════════════════
//  背景场景
// ═══════════════════════════════════════════════════════════

// 环境光
bgScene.add(new THREE.AmbientLight(0xffffff, 0.4));

// 点光源
const light1 = new THREE.PointLight('#6366f1', 80, 30);
light1.position.set(-5, 3, 5);
bgScene.add(light1);

const light2 = new THREE.PointLight('#ec4899', 60, 30);
light2.position.set(5, -2, 8);
bgScene.add(light2);

const light3 = new THREE.PointLight('#06b6d4', 50, 25);
light3.position.set(0, 4, 10);
bgScene.add(light3);

// 球形装饰
const sphereColors = [
  '#6366f1', '#ec4899', '#06b6d4', '#f59e0b',
  '#10b981', '#8b5cf6', '#f43f5e', '#14b8a6',
  '#e879f9', '#fb923c',
];
const spheres = [];
const sphereData = [
  { pos: [-5, 2, -2], r: 1.6 }, { pos: [4, 3, -1], r: 1.2 },
  { pos: [-3, -3, 0], r: 1.8 }, { pos: [6, -2, -3], r: 1.0 },
  { pos: [1, 5, -4], r: 1.4 },  { pos: [-6, -1, -5], r: 1.3 },
  { pos: [5, -4, 2], r: 1.5 },  { pos: [-4, 4, 3], r: 0.9 },
  { pos: [0, -5, -2], r: 1.7 }, { pos: [7, 1, -6], r: 1.1 },
];

sphereData.forEach(({ pos, r }, i) => {
  const geo = new THREE.SphereGeometry(r, 48, 48);
  const mat = new THREE.MeshStandardMaterial({
    color: new THREE.Color(sphereColors[i]),
    roughness: 0.4,
    metalness: 0.1,
    transparent: true,
    opacity: 0.55,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(...pos);
  mesh.userData = {
    basePos: mesh.position.clone(),
    speed: 0.3 + Math.random() * 0.6,
    amp: 0.3 + Math.random() * 1.0,
    phase: Math.random() * Math.PI * 2,
  };
  bgScene.add(mesh);
  spheres.push(mesh);
});

// 背景粒子
const particlesGeo = new THREE.BufferGeometry();
const particlesCount = 200;
const particlesPos = new Float32Array(particlesCount * 3);
const particlesSizes = new Float32Array(particlesCount);
for (let i = 0; i < particlesCount; i++) {
  particlesPos[i * 3] = (Math.random() - 0.5) * 20;
  particlesPos[i * 3 + 1] = (Math.random() - 0.5) * 14;
  particlesPos[i * 3 + 2] = (Math.random() - 0.5) * 10 - 5;
  particlesSizes[i] = Math.random() * 0.08 + 0.02;
}
particlesGeo.setAttribute('position', new THREE.BufferAttribute(particlesPos, 3));
particlesGeo.setAttribute('size', new THREE.BufferAttribute(particlesSizes, 1));

const particlesMat = new THREE.PointsMaterial({
  color: 0xffffff,
  size: 0.04,
  transparent: true,
  opacity: 0.3,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
const particles = new THREE.Points(particlesGeo, particlesMat);
bgScene.add(particles);

// ═══════════════════════════════════════════════════════════
//  自定义透射着色器 (MeshTransmissionMaterial 近似)
// ═══════════════════════════════════════════════════════════

const transmissionVertex = /* glsl */ `
  varying vec3 vWorldPos;
  varying vec3 vWorldNormal;
  varying vec4 vScreenPos;

  void main() {
    vec4 worldPos = modelMatrix * vec4(position, 1.0);
    vWorldPos = worldPos.xyz;
    vWorldNormal = normalize(mat3(modelMatrix) * normal);
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    vScreenPos = gl_Position;
  }
`;

const transmissionFragment = /* glsl */ `
  uniform sampler2D uBuffer;
  uniform float uIor;
  uniform float uThickness;
  uniform float uChromaticAberration;
  uniform float uAnisotropy;
  uniform vec3 uAttenuationColor;
  uniform float uAttenuationDistance;
  uniform float uTime;

  varying vec3 vWorldPos;
  varying vec3 vWorldNormal;
  varying vec4 vScreenPos;

  void main() {
    // 屏幕空间 UV
    vec2 screenUV = (vScreenPos.xy / vScreenPos.w) * 0.5 + 0.5;

    // 视线方向
    vec3 V = normalize(cameraPosition - vWorldPos);
    vec3 N = normalize(vWorldNormal);
    if (!gl_FrontFacing) N = -N;

    // ── 菲涅尔 ──
    float fresnel = pow(1.0 - abs(dot(N, V)), 3.0);
    // 玻璃 F0 ≈ 0.04
    fresnel = mix(0.04, 1.0, fresnel);

    // ── 折射 ──
    float eta = 1.0 / uIor;
    vec3 refractDir = refract(-V, N, eta);

    // 折射偏移 (屏幕空间)
    // 使用微妙的缩放，增强边缘扭曲
    float distortScale = 0.055 * (1.0 + fresnel * 2.5);
    vec2 refractUV = screenUV + refractDir.xy * distortScale;

    // ── 各向异性拉伸 ──
    vec3 H = normalize(-V + refractDir);
    float aniso = uAnisotropy * (1.0 - abs(dot(H, N)));
    vec2 stretch = N.xy * aniso * 0.01;
    refractUV += stretch;

    // ── 色差（RGB 分离，边缘增强） ──
    float ca = uChromaticAberration * fresnel * 0.02;
    vec2 caR = vec2(ca * 1.2, ca * 0.6);
    vec2 caG = vec2(-ca * 0.3, -ca * 0.3);
    vec2 caB = vec2(-ca * 0.4, -ca * 1.2);

    float r = texture2D(uBuffer, refractUV + caR).r;
    float g = texture2D(uBuffer, refractUV + caG).g;
    float b = texture2D(uBuffer, refractUV + caB).b;

    vec3 baseColor = vec3(r, g, b);

    // ── 厚度衰减（Beer 定律） ──
    float absorption = exp(-uThickness * uAttenuationDistance * 0.06);
    // 中心透过率高，边缘透过率低
    float thickFactor = mix(absorption, 1.0, fresnel * 0.5);
    baseColor *= thickFactor;

    // ── 衰减色混合 ──
    baseColor = mix(baseColor, uAttenuationColor, (1.0 - thickFactor) * 0.4);

    // ── 边缘高光 ──
    vec3 specular = fresnel * 0.3 * vec3(1.0, 0.97, 0.92);
    baseColor += specular;

    // ── 细微的时间变化（液态感） ──
    float liquidShift = sin(screenUV.x * 20.0 + uTime * 0.4) * cos(screenUV.y * 15.0 - uTime * 0.3) * 0.015;
    baseColor += liquidShift * fresnel;

    // ── 最终 alpha ──
    float alpha = 0.72 + fresnel * 0.28;

    gl_FragColor = vec4(baseColor, alpha);
  }
`;

// ── 透射材质工厂 ──────────────────────────────────────────
function createTransmissionMaterial(overrides = {}) {
  return new THREE.ShaderMaterial({
    uniforms: {
      uBuffer: { value: fbo.texture },
      uIor: { value: overrides.ior ?? 1.15 },
      uThickness: { value: overrides.thickness ?? 5 },
      uChromaticAberration: { value: overrides.chromaticAberration ?? 0.5 },
      uAnisotropy: { value: overrides.anisotropy ?? 0.01 },
      uAttenuationColor: { value: new THREE.Color(overrides.attenuationColor ?? '#ffffff') },
      uAttenuationDistance: { value: overrides.attenuationDistance ?? 0.25 },
      uTime: { value: 0 },
    },
    vertexShader: transmissionVertex,
    fragmentShader: transmissionFragment,
    transparent: true,
    depthWrite: true,
    depthTest: true,
  });
}

// ═══════════════════════════════════════════════════════════
//  玻璃网格
// ═══════════════════════════════════════════════════════════

const glassMeshes = {};

function createLensMesh() {
  // 圆柱体 → 俯视即透镜圆盘
  const geo = new THREE.CylinderGeometry(0.55, 0.55, 0.08, 96, 4);
  const mat = createTransmissionMaterial({
    ior: 1.15,
    thickness: 4,
    chromaticAberration: 0.5,
    anisotropy: 0.02,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.x = Math.PI / 2;
  mesh.position.set(0, 0, 15);
  mesh.renderOrder = 1;
  mesh.userData = { mode: 'lens', scale: 1 };
  return mesh;
}

function createCubeMesh() {
  // 圆角立方体效果：高分段数使法线平滑
  const geo = new THREE.BoxGeometry(0.9, 0.9, 0.9, 32, 32, 32);
  const mat = createTransmissionMaterial({
    ior: 1.12,
    thickness: 6,
    chromaticAberration: 0.6,
    anisotropy: 0.03,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(0, 0, 15);
  mesh.renderOrder = 1;
  mesh.userData = { mode: 'cube', scale: 1 };
  return mesh;
}

function createBarMesh() {
  const geo = new THREE.BoxGeometry(2.2, 0.55, 0.14, 64, 24, 4);
  const mat = createTransmissionMaterial({
    ior: 1.18,
    thickness: 8,
    chromaticAberration: 0.45,
    anisotropy: 0.005,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(0, 0, 15);
  mesh.renderOrder = 1;
  mesh.userData = { mode: 'bar', scale: 1 };
  return mesh;
}

// 预创建所有模式网格
glassMeshes.lens = createLensMesh();
glassMeshes.cube = createCubeMesh();
glassMeshes.bar = createBarMesh();

// 当前活跃玻璃
let activeGlass = glassMeshes[currentMode];
mainScene.add(activeGlass);

// ═══════════════════════════════════════════════════════════
//  事件监听
// ═══════════════════════════════════════════════════════════

// 鼠标追踪
window.addEventListener('mousemove', (e) => {
  targetMouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  targetMouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
});

// 触摸追踪
window.addEventListener('touchmove', (e) => {
  if (e.touches.length) {
    targetMouse.x = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
    targetMouse.y = -(e.touches[0].clientY / window.innerHeight) * 2 + 1;
  }
}, { passive: true });

// 模式切换
controlsEl.addEventListener('click', (e) => {
  const btn = e.target.closest('.control-btn');
  if (!btn) return;

  const mode = btn.dataset.mode;
  if (mode === currentMode) return;

  currentMode = mode;

  // 移除旧玻璃
  mainScene.remove(activeGlass);

  // 添加新玻璃
  activeGlass = glassMeshes[mode];
  mainScene.add(activeGlass);

  // 更新 UI
  buttons.forEach((b) => b.classList.remove('active'));
  btn.classList.add('active');
});

// 窗口大小
window.addEventListener('resize', () => {
  const w = window.innerWidth;
  const h = window.innerHeight;

  camera.aspect = w / h;
  camera.updateProjectionMatrix();

  renderer.setSize(w, h);
  fbo.setSize(w * 2, h * 2);
});

// ═══════════════════════════════════════════════════════════
//  动画循环
// ═══════════════════════════════════════════════════════════

const clock = new THREE.Clock();
const pt = new THREE.Vector3();
const vt = new THREE.Vector3();

function getViewportSizeAtZ(z) {
  const dist = camera.position.z - z;
  const vFovRad = THREE.MathUtils.degToRad(camera.fov);
  const h = 2 * Math.tan(vFovRad / 2) * Math.abs(dist);
  const w = h * camera.aspect;
  return { width: w, height: h };
}

function animate(timestamp) {
  requestAnimationFrame(animate);

  const delta = Math.min(clock.getDelta(), 0.1);
  const elapsed = timestamp * 0.001;

  // ── 平滑鼠标跟随 ──
  const lambda = 4;
  const t = 1 - Math.exp(-lambda * delta);
  mouse.lerp(targetMouse, t);

  // ── 更新玻璃位置 ──
  const vp = getViewportSizeAtZ(15);
  const mode = currentMode;

  if (mode === 'bar') {
    // Bar 模式：锁定底部，仅水平跟随
    const destX = (mouse.x * vp.width) / 2;
    const destY = -vp.height / 2 + 0.35;
    pt.set(destX, destY, 15);
  } else {
    // Lens / Cube：完全跟随鼠标
    const destX = (mouse.x * vp.width) / 2;
    const destY = (mouse.y * vp.height) / 2;
    pt.set(destX, destY, 15);
  }

  vt.copy(pt).sub(activeGlass.position).multiplyScalar(t);
  activeGlass.position.add(vt);

  // ── 立方体微旋转（增加液态感） ──
  if (mode === 'cube') {
    activeGlass.rotation.y += vt.x * 0.5;
    activeGlass.rotation.x += vt.y * -0.5;
    activeGlass.rotation.y *= 0.92;
    activeGlass.rotation.x *= 0.92;
  }

  // ── 更新着色器时间 ──
  if (activeGlass.material.uniforms) {
    activeGlass.material.uniforms.uTime.value = elapsed;
  }

  // ── 动画背景球体 ──
  spheres.forEach((s) => {
    const d = s.userData;
    s.position.x = d.basePos.x + Math.sin(elapsed * d.speed + d.phase) * d.amp;
    s.position.y = d.basePos.y + Math.cos(elapsed * d.speed * 0.7 + d.phase) * d.amp * 0.8;
  });

  // 动画粒子
  particles.rotation.y += delta * 0.05;
  particles.rotation.x += delta * 0.02;

  // 动画灯光
  light1.intensity = 60 + Math.sin(elapsed * 0.5) * 20;
  light2.intensity = 50 + Math.cos(elapsed * 0.7) * 15;

  // ── 渲染管线 ──
  // 1. 背景场景 → FBO
  renderer.setRenderTarget(fbo);
  renderer.render(bgScene, camera);
  renderer.setRenderTarget(null);

  // 2. 全屏四边形（显示背景）
  quadMat.map = fbo.texture;
  quadMat.needsUpdate = true;
  renderer.render(quadScene, orthoCam);

  // 3. 玻璃网格覆盖在上面
  renderer.autoClear = false;
  renderer.render(mainScene, camera);
  renderer.autoClear = true;
}

// ── 启动 ──
requestAnimationFrame(animate);
</script>
</body>
</html>
