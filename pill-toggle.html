<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pill Toggle Button</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #1a1a2e;
    gap: 40px;
    flex-wrap: wrap;
  }

  .pill-toggle {
    position: relative;
    width: 80px;
    height: 44px;
    border-radius: 22px;
    background: #3a3a5c;
    border: 2.5px solid rgba(255, 255, 255, 0.12);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4), 0 1px 3px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.06);
    cursor: pointer;
    transition: background 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .pill-toggle.active {
    background: #6c5ce7;
    border-color: rgba(255, 255, 255, 0.18);
    box-shadow: 0 2px 12px rgba(108, 92, 231, 0.4), 0 1px 3px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
  }

  .pill-toggle .knob {
    position: absolute;
    top: 4px;
    left: 4px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3), 0 1px 2px rgba(0, 0, 0, 0.2);
    will-change: transform;
  }

  /* ---- 演示用：不同尺寸 ---- */
  .pill-toggle.sm {
    width: 56px;
    height: 30px;
    border-radius: 15px;
    border-width: 2px;
  }
  .pill-toggle.sm .knob {
    top: 3px;
    left: 3px;
    width: 20px;
    height: 20px;
  }

  .pill-toggle.lg {
    width: 110px;
    height: 58px;
    border-radius: 29px;
    border-width: 3px;
  }
  .pill-toggle.lg .knob {
    top: 5px;
    left: 5px;
    width: 42px;
    height: 42px;
  }

  .pill-toggle.green.active {
    background: #00b894;
    border-color: rgba(255, 255, 255, 0.18);
    box-shadow: 0 2px 12px rgba(0, 184, 148, 0.4), 0 1px 3px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
  }
  .pill-toggle.orange.active {
    background: #e17055;
    border-color: rgba(255, 255, 255, 0.18);
    box-shadow: 0 2px 12px rgba(225, 112, 85, 0.4), 0 1px 3px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
  }
  .pill-toggle.blue.active {
    background: #0984e3;
    border-color: rgba(255, 255, 255, 0.18);
    box-shadow: 0 2px 12px rgba(9, 132, 227, 0.4), 0 1px 3px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
  }
</style>
</head>
<body>

<div class="pill-toggle sm green" onclick="togglePill(this)">
  <div class="knob"></div>
</div>

<div class="pill-toggle blue" onclick="togglePill(this)">
  <div class="knob"></div>
</div>

<div class="pill-toggle lg orange" onclick="togglePill(this)">
  <div class="knob"></div>
</div>

<script>
/**
 * 药丸切换按钮
 * - 点击后圆形滑块丝滑滑动到另一端
 * - 到达后产生 1 次反弹，反弹幅度为行程的 1%
 */

function togglePill(el) {
  const knob = el.querySelector('.knob');
  const isActive = el.classList.toggle('active');

  // 计算行程：药丸内容区宽度 - 圆形宽度 - 左右间距
  const pillWidth = el.clientWidth;
  const knobWidth = knob.offsetWidth;
  const knobLeft = parseFloat(getComputedStyle(knob).left);
  const travel = pillWidth - knobWidth - knobLeft * 2;

  // 起始和目标位置
  const startX = isActive ? 0 : travel;
  const targetX = isActive ? travel : 0;

  // 反弹参数：行程的 1%，最少 2px 保证可见
  const bounceRange = Math.max(travel * 0.01, 2);
  const bounceDirection = isActive ? -1 : 1;

  // 分段动画：滑动 → 碰撞反弹 → 归位
  const keyframes = [
    {
      transform: `translateX(${startX}px)`,
      offset: 0,
      easing: 'cubic-bezier(0.22, 1, 0.36, 1)',
    },
    {
      transform: `translateX(${targetX}px)`,
      offset: 0.65,
      easing: 'cubic-bezier(0.34, 0, 0.75, 0)',
    },
    {
      transform: `translateX(${targetX + bounceDirection * bounceRange}px)`,
      offset: 0.82,
      easing: 'cubic-bezier(0.22, 1, 0.36, 1)',
    },
    {
      transform: `translateX(${targetX}px)`,
      offset: 1,
    },
  ];

  const animation = knob.animate(keyframes, {
    duration: 450,
    fill: 'forwards',
  });

  animation.onfinish = () => {
    knob.style.transform = `translateX(${targetX}px)`;
    animation.cancel();
  };
}
</script>

</body>
</html>
