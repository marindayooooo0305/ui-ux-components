<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pill Toggle Button</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #1a1a2e;
    gap: 40px;
    flex-wrap: wrap;
  }

  .pill-toggle {
    /* 可自定义的颜色变量 */
    --pill-border-color: rgba(255, 255, 255, 0.12);
    --pill-border-active-color: rgba(255, 255, 255, 0.18);
    --pill-cavity-color: #3a3a5c;
    --pill-cavity-active-color: #6c5ce7;
    --pill-knob-color: #fff;

    position: relative;
    width: 80px;
    height: 44px;
    border-radius: 22px;
    background: var(--pill-cavity-color);
    border: 2.5px solid var(--pill-border-color);
    /* 伪3D边框：外层高光(左上) + 外层暗影(右下) + 内层高光 + 内层暗影 + 整体投影 */
    box-shadow:
      inset 1px 1px 0 rgba(255, 255, 255, 0.15),
      inset -1px -1px 0 rgba(0, 0, 0, 0.25),
      inset 0 0 0 1px rgba(255, 255, 255, 0.05),
      0 2px 6px rgba(0, 0, 0, 0.5),
      0 1px 2px rgba(0, 0, 0, 0.3);
    cursor: pointer;
    transition: background 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .pill-toggle.active {
    background: var(--pill-cavity-active-color);
    border-color: var(--pill-border-active-color);
    box-shadow:
      inset 1px 1px 0 rgba(255, 255, 255, 0.2),
      inset -1px -1px 0 rgba(0, 0, 0, 0.2),
      inset 0 0 0 1px rgba(255, 255, 255, 0.08),
      0 3px 10px rgba(0, 0, 0, 0.4),
      0 1px 3px rgba(0, 0, 0, 0.3);
  }

  .pill-toggle .knob {
    position: absolute;
    top: 4px;
    left: 4px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--pill-knob-color);
    /* 伪3D球体：内高光(左上) + 内暗影(右下) + 外投影 */
    box-shadow:
      inset 2px 2px 4px rgba(255, 255, 255, 0.4),
      inset -2px -2px 4px rgba(0, 0, 0, 0.15),
      0 2px 6px rgba(0, 0, 0, 0.4),
      0 1px 2px rgba(0, 0, 0, 0.3);
    will-change: transform;
    transition: background 0.35s ease;
  }

  /* ---- 演示：不同配色 ---- */
  .pill-toggle.green {
    --pill-cavity-color: #2d3a2e;
    --pill-cavity-active-color: #00b894;
  }
  .pill-toggle.blue {
    --pill-cavity-color: #2a2e3a;
    --pill-cavity-active-color: #0984e3;
  }
  .pill-toggle.orange {
    --pill-cavity-color: #3a2e2a;
    --pill-cavity-active-color: #e17055;
  }
  .pill-toggle.dark-knob {
    --pill-knob-color: #1a1a2e;
  }
</style>
</head>
<body>

<!-- 默认配色 -->
<div class="pill-toggle" onclick="togglePill(this)">
  <div class="knob"></div>
</div>

<!-- 绿色空腔 + 深色球体 -->
<div class="pill-toggle green dark-knob" onclick="togglePill(this)">
  <div class="knob"></div>
</div>

<!-- 蓝色空腔 -->
<div class="pill-toggle blue" onclick="togglePill(this)">
  <div class="knob"></div>
</div>

<!-- 橙色空腔 -->
<div class="pill-toggle orange" onclick="togglePill(this)">
  <div class="knob"></div>
</div>

<script>
/**
 * 药丸切换按钮
 * - 点击后圆形滑块丝滑滑动到另一端
 * - 到达后产生 1 次反弹，反弹幅度为行程的 1%
 *
 * 可自定义 CSS 变量：
 *   --pill-border-color          边框颜色（未激活）
 *   --pill-border-active-color   边框颜色（激活）
 *   --pill-cavity-color          空腔颜色（未激活）
 *   --pill-cavity-active-color   空腔颜色（激活）
 *   --pill-knob-color            球体颜色
 */

function togglePill(el) {
  const knob = el.querySelector('.knob');
  const isActive = el.classList.toggle('active');

  const pillWidth = el.clientWidth;
  const knobWidth = knob.offsetWidth;
  const knobLeft = parseFloat(getComputedStyle(knob).left);
  const travel = pillWidth - knobWidth - knobLeft * 2;

  const startX = isActive ? 0 : travel;
  const targetX = isActive ? travel : 0;

  // 反弹参数：行程的 1%，最少 2px 保证可见
  const bounceRange = Math.max(travel * 0.01, 2);
  const bounceDirection = isActive ? -1 : 1;

  const keyframes = [
    {
      transform: `translateX(${startX}px)`,
      offset: 0,
      easing: 'cubic-bezier(0.22, 1, 0.36, 1)',
    },
    {
      transform: `translateX(${targetX}px)`,
      offset: 0.65,
      easing: 'cubic-bezier(0.34, 0, 0.75, 0)',
    },
    {
      transform: `translateX(${targetX + bounceDirection * bounceRange}px)`,
      offset: 0.82,
      easing: 'cubic-bezier(0.22, 1, 0.36, 1)',
    },
    {
      transform: `translateX(${targetX}px)`,
      offset: 1,
    },
  ];

  const animation = knob.animate(keyframes, {
    duration: 450,
    fill: 'forwards',
  });

  animation.onfinish = () => {
    knob.style.transform = `translateX(${targetX}px)`;
    animation.cancel();
  };
}
</script>

</body>
</html>
